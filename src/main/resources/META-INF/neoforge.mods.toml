modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="MC AI Companion contributors"
description='''
Adds a NeoForge companion NPC bridge for local AI-driven Minecraft assistance.
The mod collects bounded player, NPC, inventory, and world context, sends it to
a localhost AI bridge, and executes only whitelisted in-game actions.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
